name: Build and Push to Docker Hub
# 1. Trigger the workflow whenever code is pushed to the main branch
on:
  push:
    branches: [ "main" ]
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    # Step 2: Check out the repository's source code
    - name: Check out the code
      uses: actions/checkout@v4
    # Step 3: Log in to Docker Hub using the secrets we stored
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    # Step 4: Build the image using your local Dockerfile and push it
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: TON-USERNAME-DOCKERHUB/stage:latest
